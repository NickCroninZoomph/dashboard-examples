# Publishes only the static site files to branch `gh-pages`.
# In repo Settings → Pages, set Source to "Deploy from branch" → branch gh-pages → folder / (root)
name: Publish site to gh-pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: publish-gh-pages
  cancel-in-progress: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build site folder
        run: |
          mkdir -p site
          cp index.html site/
          [ -f .nojekyll ] && cp .nojekyll site/
          cp -r nba-prime-dashboard invisalign-nfl-dashboard site/

      - name: Push to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./site
          force_orphan: true
