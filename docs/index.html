<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Dashboards 3.5 lite — NBA on Prime, Invisalign NFL, Portland Thorns." />
  <title>Dashboards 3.5 lite — dashboard-examples</title>
  <style>
    :root {
      --bg: #060a10;
      --card: #0f1620;
      --border: #1e2a3a;
      --text: #e8eef5;
      --muted: #7a8fa3;
      --accent: #00a8e0;
      --accent2: #0093ce;
      --thorns: #c8102e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Helvetica, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: max(32px, env(safe-area-inset-top)) max(20px, env(safe-area-inset-right))
        max(32px, env(safe-area-inset-bottom)) max(20px, env(safe-area-inset-left));
    }
    main {
      max-width: 560px;
      width: 100%;
    }
    h1.tagline {
      font-size: 1.4rem;
      font-weight: 800;
      letter-spacing: -0.02em;
      margin-bottom: 24px;
      line-height: 1.3;
      color: var(--text);
    }
    ul { list-style: none; }
    li + li { margin-top: 12px; }
    a {
      display: block;
      padding: 16px 18px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      color: var(--text);
      text-decoration: none;
      font-weight: 600;
      transition: border-color 0.15s, box-shadow 0.15s;
    }
    a span {
      display: block;
      font-size: 0.8rem;
      font-weight: 500;
      color: var(--muted);
      margin-top: 4px;
    }
    a.nba {
      border-left: 3px solid var(--accent);
    }
    a.nba:hover {
      border-color: var(--accent);
      box-shadow: 0 0 0 1px rgba(0, 168, 224, 0.22);
    }
    a.inv {
      border-left: 3px solid var(--accent2);
    }
    a.inv:hover {
      border-color: var(--accent2);
      box-shadow: 0 0 0 1px rgba(0, 147, 206, 0.22);
    }
    a.thorns {
      border-left: 3px solid var(--thorns);
    }
    a.thorns:hover {
      border-color: #e02040;
      box-shadow: 0 0 0 1px rgba(200, 16, 46, 0.25);
    }
    @media (max-width: 480px) {
      h1.tagline { font-size: 1.2rem; }
      a { padding: 14px 16px; }
    }
  </style>
</head>
<body>
  <main>
    <h1 class="tagline">Dashboards 3.5 lite</h1>
    <ul>
      <li>
        <a class="nba" href="nba-prime-dashboard/">
          NBA on Prime — Social Dashboard
          <span>Competitive scorecard, platforms, top posts</span>
        </a>
      </li>
      <li>
        <a class="inv" href="invisalign-nfl-dashboard/">
          Invisalign NFL Sponsorship Report
          <span>Overview, teams, programs, exposure, top posts</span>
        </a>
      </li>
      <li>
        <a class="thorns" href="thorns-dashboard/">
          Portland Thorns FC — 2025 Sponsorship Report
          <span>Broadcast, social, sponsors, insights, date range</span>
        </a>
      </li>
    </ul>
  </main>
</body>
</html>
